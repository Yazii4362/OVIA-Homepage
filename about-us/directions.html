<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directions — OVIA Pharmaceuticals</title>
  <link rel="stylesheet" href="../assets/css/common.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="gnb-placeholder"></div>

  <div class="sub-visual">
    <div class="sub-visual-inner">
      <p class="sub-visual-eyebrow">About Us</p>
      <h1 class="sub-visual-title">Directions</h1>
      <p class="sub-visual-desc">OVIA 본사 및 연구소 방문을 위한 위치 정보를 안내해 드립니다.</p>
    </div>
  </div>

  <div class="page-wrap container">
    <section class="page-section">
      <div class="section-header">
        <p class="sec-label">Headquarters</p>
        <h2 class="sec-title">오시는 길</h2>
        <div class="sec-divider"></div>
      </div>

      <div class="directions-layout">
        <div class="map-container">
          <!-- Placeholder for map -->
          <div class="map-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <p>지도 영역 (Google Maps API)</p>
          </div>
        </div>

        <div class="address-info">
          <div class="info-item">
            <h3>주소</h3>
            <p>서울특별시 강남구 테헤란로 123 OVIA 타워 20층</p>
          </div>
          <div class="info-item">
            <h3>전화번호</h3>
            <p>02-123-4567</p>
          </div>
          <div class="info-item">
            <h3>팩스</h3>
            <p>02-123-4568</p>
          </div>
          <div class="info-item">
            <h3>교통편</h3>
            <p><strong>지하철:</strong> 2호선 역삼역 3번 출구 도보 5분</p>
            <p><strong>버스:</strong> 역삼역.포스코타워역삼 정류장 하차</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>
    .directions-layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: var(--space-10);
      align-items: start;
    }

    .map-container {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--color-surface-variant);
      border-radius: var(--shape-lg);
      overflow: hidden;
      border: 1px solid var(--color-outline-variant);
    }

    .map-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--color-on-surface-variant);
      gap: var(--space-4);
    }

    .address-info {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .info-item h3 {
      font-size: var(--type-title-md);
      font-weight: 700;
      color: var(--color-on-surface);
      margin-bottom: var(--space-2);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--color-primary-container);
      display: inline-block;
    }

    .info-item p {
      font-size: var(--type-body-md);
      color: var(--color-on-surface-variant);
      line-height: 1.6;
    }

    @media (max-width: 1024px) {
      .directions-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/gnb.js"></script>
  <script src="../assets/js/header.js"></script>
  <script src="../assets/js/submenu.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
