<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMO — OVIA Pharmaceuticals</title>
  <link rel="stylesheet" href="../assets/css/common.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="gnb-placeholder"></div>

  <div class="sub-visual">
    <div class="sub-visual-inner">
      <p class="sub-visual-eyebrow">Business</p>
      <h1 class="sub-visual-title">CMO</h1>
      <p class="sub-visual-desc">세계적 수준의 생산 시설과 엄격한 품질 관리를 통해 최적의 CMO 서비스를 제공합니다.</p>
    </div>
  </div>

  <div class="page-wrap container">
    <section class="page-section">
      <div class="section-header">
        <p class="sec-label">Manufacturing</p>
        <h2 class="sec-title">위탁 생산 서비스</h2>
        <div class="sec-divider"></div>
      </div>

      <div class="cmo-features">
        <div class="cmo-feature">
          <div class="feature-text">
            <h3>Global Compliance</h3>
            <p>cGMP, EU-GMP 등 글로벌 표준을 준수하는 생산 공정을 갖추고 있습니다.</p>
          </div>
        </div>
        <div class="cmo-feature">
          <div class="feature-text">
            <h3>Scale-up Capability</h3>
            <p>초기 임상 시료부터 상업용 대량 생산까지 유연한 생산 규모를 지원합니다.</p>
          </div>
        </div>
        <div class="cmo-feature">
          <div class="feature-text">
            <h3>Advanced Technology</h3>
            <p>최첨단 배양 및 정제 기술을 통해 고순도, 고수율의 의약품 생산을 보장합니다.</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>
    .cmo-features {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
    }
    .cmo-feature {
      padding: var(--space-10);
      background: var(--color-surface);
      border-left: 4px solid var(--color-primary);
      border-radius: var(--shape-sm);
      box-shadow: var(--elevation-1);
    }
    .cmo-feature h3 {
      font-size: var(--type-title-lg);
      margin-bottom: var(--space-2);
      color: var(--color-primary);
    }
  </style>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/gnb.js"></script>
  <script src="../assets/js/header.js"></script>
  <script src="../assets/js/submenu.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
