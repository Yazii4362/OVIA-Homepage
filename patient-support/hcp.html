<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HCP Support — OVIA Pharmaceuticals</title>
  <link rel="stylesheet" href="../assets/css/common.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="gnb-placeholder"></div>

  <div class="sub-visual">
    <div class="sub-visual-inner">
      <p class="sub-visual-eyebrow">Patient Support</p>
      <h1 class="sub-visual-title">HCP Support</h1>
      <p class="sub-visual-desc">의료 전문가 분들께 정확한 학술 정보와 치료 솔루션을 제공합니다.</p>
    </div>
  </div>

  <div class="page-wrap container">
    <section class="page-section">
      <div class="section-header">
        <p class="sec-label">Professionals</p>
        <h2 class="sec-title">의료진 지원</h2>
        <div class="sec-divider"></div>
      </div>

      <div class="hcp-resources">
        <div class="resource-item card--interactive card--outlined">
          <div class="card__body">
            <h3>Medical Publications</h3>
            <p>최신 임상 데이터와 학술 논문 자료를 열람하실 수 있습니다.</p>
          </div>
        </div>
        <div class="resource-item card--interactive card--outlined">
          <div class="card__body">
            <h3>Product Monographs</h3>
            <p>OVIA 제품의 상세 정보와 처방 가이드를 확인하세요.</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>
    .hcp-resources {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-8);
    }
    .resource-item h3 {
      font-size: var(--type-title-lg);
      margin-bottom: var(--space-2);
      color: var(--color-primary);
    }
  </style>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/gnb.js"></script>
  <script src="../assets/js/header.js"></script>
  <script src="../assets/js/submenu.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
