<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programs — OVIA Pharmaceuticals</title>
  <link rel="stylesheet" href="../assets/css/common.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="gnb-placeholder"></div>

  <div class="sub-visual">
    <div class="sub-visual-inner">
      <p class="sub-visual-eyebrow">Patient Support</p>
      <h1 class="sub-visual-title">Programs</h1>
      <p class="sub-visual-desc">환자분들이 더 건강한 일상을 되찾을 수 있도록 다양한 지원 프로그램을 운영합니다.</p>
    </div>
  </div>

  <div class="page-wrap container">
    <section class="page-section">
      <div class="section-header">
        <p class="sec-label">Support</p>
        <h2 class="sec-title">환자 지원 프로그램</h2>
        <div class="sec-divider"></div>
      </div>

      <div class="program-grid">
        <div class="program-card card--elevated">
          <div class="card__body">
            <h3>치료비 지원 프로그램</h3>
            <p>경제적 어려움을 겪는 환자분들을 위해 일부 의약품에 대한 치료비를 지원합니다.</p>
          </div>
        </div>
        <div class="program-card card--elevated">
          <div class="card__body">
            <h3>심리 상담 서비스</h3>
            <p>투병 과정에서 겪는 정서적 고통을 완화하기 위해 전문 상담 서비스를 제공합니다.</p>
          </div>
        </div>
        <div class="program-card card--elevated">
          <div class="card__body">
            <h3>복약 지도 및 정보</h3>
            <p>올바른 약물 복용 방법과 부작용 관리 정보를 이해하기 쉽게 안내합니다.</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <style>
    .program-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-8);
    }
    .program-card h3 {
      font-size: var(--type-title-lg);
      margin-bottom: var(--space-3);
      color: var(--color-primary);
    }
  </style>

  <div id="footer-placeholder"></div>

  <script src="../assets/js/gnb.js"></script>
  <script src="../assets/js/header.js"></script>
  <script src="../assets/js/submenu.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/footer.js"></script>
</body>
</html>
