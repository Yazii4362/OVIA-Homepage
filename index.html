<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVIA Pharmaceuticals — Opening New Paths to Life</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/reset.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/header.css" />

  <style>
    /* ─── Hero ─── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--gradient-frost);
    }
    .hero-blob-1 { width: 560px; height: 560px; top: -80px; right: -80px; }
    .hero-blob-2 { width: 360px; height: 360px; bottom: -40px; left: -60px; animation-delay: -4s; }

    .hero-content {
      position: relative;
      z-index: 1;
      padding-top: var(--header-height);
      padding-block: var(--space-30) var(--space-20);
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--type-label-sm);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: var(--space-6);
    }
    .hero-eyebrow::before {
      content: '';
      width: 20px;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, var(--type-display-lg));
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--color-on-surface);
      margin-bottom: var(--space-6);
    }
    .hero-title em {
      font-style: italic;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: var(--type-body-lg);
      color: var(--color-on-surface-variant);
      max-width: 480px;
      line-height: 1.75;
      margin-bottom: var(--space-8);
    }

    .hero-actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-16);
    }

    /* ─── Stats bar ─── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-8);
      max-width: 480px;
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-outline-variant);
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: var(--type-headline-lg);
      font-weight: 400;
      color: var(--color-on-surface);
      line-height: 1;
    }
    .stat-label {
      font-size: var(--type-label-sm);
      color: var(--color-on-surface-variant);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: var(--space-1);
    }
  </style>
</head>

<body>

<!-- ════════════ HEADER (gnb.js가 inject) ════════════ -->
<div id="gnb-placeholder"></div>

<!-- ════════════ HERO ════════════ -->
<main>
  <section class="hero">
    <div class="bg-blob bg-blob--red hero-blob-1"></div>
    <div class="bg-blob bg-blob--green hero-blob-2"></div>
    <div class="container">
      <div class="hero-content">
        <p class="hero-eyebrow" data-animate>Global Pharmaceutical Innovation</p>
        <h1 class="hero-title" data-animate data-animate-delay="1">
          Opening<br/><em>New Paths</em><br/>to Life
        </h1>
        <p class="hero-desc" data-animate data-animate-delay="2">
          OVIA는 혁신적인 신약 개발을 통해 전 세계 환자들에게 새로운 생명의 길을 열어갑니다.
          생명공학의 가능성과 인류에 대한 헌신이 우리의 길을 이끕니다.
        </p>
        <div class="hero-actions" data-animate data-animate-delay="3">
          <a href="#" class="btn btn-primary">파이프라인 보기</a>
          <a href="#" class="btn btn-outline">회사소개</a>
        </div>
        <div class="stats-bar" data-animate data-animate-delay="3">
          <div class="stat-item">
            <div class="stat-num">32+</div>
            <div class="stat-label">PIPELINE ASSETS</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">48</div>
            <div class="stat-label">COUNTRIES</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">60yr</div>
            <div class="stat-label">OF INNOVATION</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- JS -->
<script src="assets/js/gnb.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/main.js"></script>



</body>
</html>
